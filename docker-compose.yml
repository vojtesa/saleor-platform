services:
  api:
    image: ghcr.io/saleor/saleor:3.23
    ports:
      - 8000:8000
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - saleor-backend-tier
    stdin_open: true
    tty: true
    depends_on:
      - db
      - cache
      - jaeger
    volumes:
      # shared volume between worker and api for media
      - saleor-media:/app/media
    env_file:
      - common.env
      - backend.env
    environment:
      - DASHBOARD_URL=http://localhost:9000/
      - ALLOWED_HOSTS=localhost,127.0.0.1,api

  dashboard:
    image: ghcr.io/saleor/saleor-dashboard:3.23
    ports:
      - 9000:80
    restart: unless-stopped

  db:
    image: library/postgres:15-alpine
    ports:
      - 5432:5432
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - saleor-db:/var/lib/postgresql/data
      - ./replica_user.sql:/docker-entrypoint-initdb.d/replica_user.sql:ro,z
    environment:
      - POSTGRES_USER=saleor
      - POSTGRES_PASSWORD=saleor

  cache:
    image: valkey/valkey:8.1-alpine
    ports:
      - 6379:6379
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - saleor-cache:/data

  worker:
    image: ghcr.io/saleor/saleor:3.23
    command: /app/worker-entrypoint.sh
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    env_file:
      - common.env
      - backend.env
    depends_on:
      - cache
      - mailpit
    volumes:
      # shared volume between worker and api for media
      - saleor-media:/app/media
      - ./worker-entrypoint.sh:/app/worker-entrypoint.sh:ro
      - ./promotion-watchdog.sh:/app/promotion-watchdog.sh:ro

  jaeger:
    image: jaegertracing/jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - type: tmpfs
        target: /tmp

  mailpit:
    image: axllent/mailpit
    ports:
      - 1025:1025 # smtp server
      - 8025:8025 # web ui. Visit http://localhost:8025/ to check emails
    restart: unless-stopped
    networks:
      - saleor-backend-tier

  dynamodb:
    image: amazon/dynamodb-local:latest
    ports:
      - 8005:8000
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    command: "-jar DynamoDBLocal.jar -sharedDb"
    volumes:
      - saleor-dynamodb:/home/dynamodblocal/data

  gorse:
    image: zhenghaoz/gorse-in-one:latest
    ports:
      - 8088:8088
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - gorse-data:/gorse_data
      - ./gorse-config.toml:/etc/gorse/config.toml
    environment:
      GORSE_CACHE_STORE: postgres://saleor:saleor@db:5432/gorse?sslmode=disable
      GORSE_DATA_STORE: postgres://saleor:saleor@db:5432/gorse?sslmode=disable
    depends_on:
      - db

  typesense:
    image: typesense/typesense:27.1
    ports:
      - 8108:8108
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - typesense-data:/data
    command: "--data-dir /data --api-key=xyz --enable-cors"

  workflow-service:
    build:
      context: ../services/workflow
      dockerfile: Dockerfile
    ports:
      - 3002:3001
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - workflow-data:/data
      - ../services/workflow/src/modules/invoices:/app/templates
    environment:
      - PORT=3001
      - DATABASE_PATH=/data/workflow.db
      - API_KEY=${WORKFLOW_API_KEY:-workflow-dev-key-change-in-production}
      - CORS_ORIGIN=http://localhost:3000
      - APP_BASE_URL=http://localhost:3002
      - APP_API_BASE_URL=http://host.docker.internal:3002
      - APP_ID=cz.vojtesa.workflow
      - APP_NAME=Workflow objednavek
      - FIO_API_TOKEN=${FIO_API_TOKEN:-}
      - FIO_POLL_INTERVAL_S=${FIO_POLL_INTERVAL_S:-30}
      - FIO_ALERT_EMAIL=${FIO_ALERT_EMAIL:-fakturace@a-green.cz}
      - SMTP_HOST=${WORKFLOW_SMTP_HOST:-mailpit}
      - SMTP_PORT=${WORKFLOW_SMTP_PORT:-1025}
      - SALEOR_DASHBOARD_URL=${SALEOR_DASHBOARD_URL:-http://localhost:9000}

volumes:
  workflow-data:
  gorse-data:
  typesense-data:
  saleor-db:
    driver: local
  saleor-cache:
    driver: local
  saleor-media:
  saleor-dynamodb:

networks:
  saleor-backend-tier:
    driver: bridge
